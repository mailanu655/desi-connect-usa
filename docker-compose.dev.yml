# ─────────────────────────────────────────────────────────────
# Desi Connect USA — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ── Redis (same as prod, exposed for debugging) ────────────
  redis:
    ports:
      - '6379:6379'

  # ── Middleware (mount source for hot-reload) ────────────────
  middleware:
    build:
      args:
        NODE_ENV: development
    volumes:
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/database/src:/app/packages/database/src:ro
      - ./packages/middleware/src:/app/packages/middleware/src:ro
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    command: npx ts-node --project packages/middleware/tsconfig.json packages/middleware/src/server.ts

  # ── Web (mount source for Next.js hot-reload) ──────────────
  web:
    build:
      args:
        NODE_ENV: development
    volumes:
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/database/src:/app/packages/database/src:ro
      - ./packages/web/src:/app/packages/web/src:ro
      - ./packages/web/public:/app/packages/web/public:ro
    environment:
      - NODE_ENV=development
    command: npm run dev -w packages/web
