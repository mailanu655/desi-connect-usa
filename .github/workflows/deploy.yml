# ─────────────────────────────────────────────────────────────
# Desi Connect USA — Deploy to Production
# Triggered on push to main (after CI passes) or manual dispatch
# ─────────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/desi-connect

jobs:
  # ── Gate: only deploy if CI succeeded ─────────────────────
  check:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with deployment"

  # ── Build & Push Docker Images ────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [middleware, web]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ── Deploy Middleware ──────────────────────────────────────
  deploy-middleware:
    name: Deploy Middleware
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.MIDDLEWARE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway / Render / Fly.io
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Deploy middleware to ${{ github.event.inputs.environment || 'production' }}"
          echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-middleware:${{ github.sha }}"
          echo "──────────────────────────────────────────────"
          echo ""
          echo "Configure one of these deployment targets:"
          echo "  • Railway:  railway up --service middleware"
          echo "  • Render:   render deploy --service desi-middleware"
          echo "  • Fly.io:   fly deploy --config fly.middleware.toml"
          echo "  • AWS ECS:  aws ecs update-service ..."
          echo ""
          echo "Add the appropriate CLI and secrets to this step."

  # ── Deploy Web ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.WEB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Deploy web to ${{ github.event.inputs.environment || 'production' }}"
          echo "──────────────────────────────────────────────"
          echo ""
          echo "For Vercel (recommended for Next.js):"
          echo "  npx vercel --prod --token=\$VERCEL_TOKEN"
          echo ""
          echo "For Docker-based deployment:"
          echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}"
          echo ""
          echo "Add the appropriate CLI and secrets to this step."

  # ── Post-deploy Health Check ───────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-middleware, deploy-web]
    steps:
      - name: Check middleware health
        run: |
          echo "Health check placeholder — configure with actual endpoint:"
          echo "  curl -f \$MIDDLEWARE_URL/health || exit 1"

      - name: Check web health
        run: |
          echo "Health check placeholder — configure with actual endpoint:"
          echo "  curl -f \$WEB_URL/api/health || exit 1"
