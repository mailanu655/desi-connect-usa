# ─────────────────────────────────────────────────────────────
# Desi Connect USA — Continuous Integration
# Runs on every push/PR to main and develop branches
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ── Unit & Integration Tests ──────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --ci --coverage

      - name: Run integration tests
        run: npm run test:integration -- --ci
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build All Packages ────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build database package
        run: npm run build -w packages/database

      - name: Build middleware package
        run: npm run build -w packages/middleware

      - name: Build web package
        run: npm run build -w packages/web
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ── Docker Build (middleware) ──────────────────────────────
  docker-middleware:
    name: Docker Build — Middleware
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build middleware image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/middleware.Dockerfile
          push: false
          tags: desi-connect-middleware:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Build (web) ────────────────────────────────────
  docker-web:
    name: Docker Build — Web
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/web.Dockerfile
          push: false
          tags: desi-connect-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
